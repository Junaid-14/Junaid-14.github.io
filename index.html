<!doctype html>
<html lang="en" class="scroll-smooth">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Junaid Rehman | Interactive CV</title>
    <meta
      name="description"
      content="Interactive CV of Junaid Rehman — Neuromorphic Project at Phasor, with projects, publications, and skills dashboard."
    />
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              deep: "#020617",
              panel: "#0f172a",
              accent: "#38bdf8",
              accentSoft: "#67e8f9",
            },
            keyframes: {
              float: {
                "0%, 100%": { transform: "translateY(0px)" },
                "50%": { transform: "translateY(-8px)" },
              },
            },
            animation: {
              float: "float 6s ease-in-out infinite",
            },
            boxShadow: {
              glow: "0 0 0 1px rgba(56, 189, 248, 0.15), 0 20px 40px rgba(2, 6, 23, 0.45)",
            },
          },
        },
      };
    </script>
    <style>
      body {
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial,
          "Apple Color Emoji", "Segoe UI Emoji";
      }
    </style>
  </head>
  <body class="bg-deep text-slate-100 antialiased">
    <div id="root"></div>

    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <script type="text/babel">
      const { useEffect, useMemo, useState } = React;

      const profile = {
        name: "Junaid Rehman",
        role: "Neuromorphic Project at Phasor",
        location: "Islamabad, Pakistan",
        email: "junaidrehman2288@gmail.com",
        linkedin: "https://www.linkedin.com/in/junaid-rehman/",
        github: "https://github.com/Junaid-14/",
      };

      const navItems = [
        { id: "home", label: "Home" },
        { id: "featured-paper", label: "NICE 2026" },
        { id: "projects", label: "Projects" },
        { id: "research", label: "Research" },
        { id: "skills", label: "Skills" },
        { id: "contact", label: "Contact" },
      ];

      const project = {
        title: "Real-Time Sensor Monitoring System",
        date: "July 2025",
        points: [
          "Designed and implemented a kernel module for real-time sensor data monitoring.",
          "Applied RTOS concepts to maintain deterministic data flow and low-latency behavior.",
          "Configured an AWS EC2 instance with QEMU to emulate ARM hardware for development and testing.",
          "Used Git for version control and SSH/SCP for secure remote file management.",
        ],
      };

      const papers = [
        {
          title:
            "Memory-Augmented Spiking Networks: Synergistic Integration of Complementary Mechanisms for Neuromorphic Vision",
          venue: "NICE 2026",
          year: "2026",
          status: "Under Review",
          featured: true,
          authors: "Effiong Blessing, Chiung-Yi Tseng, Isaac Nkrumah, Junaid Rehman",
          abstract:
            "Spiking Neural Networks (SNNs) offer biological plausibility and energy efficiency, yet systematic investigation of memory augmentation strategies remains limited. We present five-model ablation studies, integrating Leaky Integrate-and-Fire neurons, Supervised Contrastive Learning (SCL), Hopfield networks, and Hierarchical Gated Recurrent Networks (HGRN) on N-MNIST. Our study shows: baseline SNNs naturally form organized group of neurons called structured assemblies (silhouette 0.687±0.012). Individual augmentations introduce trade-offs: SCL improves accuracy (+0.28%) but disrupts clustering (drop to silhouette 0.637±0.015); HGRN provides consistent gains (+1.01% accuracy, 170.6× efficiency). Full integration achieves synergistic balance (silhouette 0.715±0.008, 97.49±0.10% accuracy, 1.85±0.06μJ, 97.0% sparsity). Optimal results emerge from architectural balance rather than individual optimization.",
          links: [
            {
              label: "Paper",
              href: "https://ctseng777.github.io/assets/pdf/Memory_Augmented_Spiking_Networks__Synergistic_Integration_of_Complementary_Mechanisms_for_Neuromorphic_Vision.pdf",
            },
          ],
        },
        {
          title: "Modality-Dependent Memory Mechanisms in Cross-Modal Neuromorphic Computing",
          venue: "arXiv (cs.NE)",
          year: "2025",
          status: "Under Review",
          featured: false,
          authors:
            "Effiong Blessing, Chiung-Yi Tseng, Somshubhra Roy, Isaac Nkrumah, Junaid Rehman",
          abstract:
            "First comprehensive cross-modal ablation study of memory mechanisms in SNNs across visual (N-MNIST) and auditory (SHD) neuromorphic datasets. The work reports modality-specific behavior, including strong visual gains from Hopfield memory and better cross-modal stability from supervised contrastive learning.",
          keyPoints: [
            "Title extracted: Modality-Dependent Memory Mechanisms in Cross-Modal Neuromorphic Computing",
            "Venue extracted: arXiv (cs.NE), manuscript under review",
            "Year extracted: 2025",
            "Summary prepared from attached PDF metadata",
          ],
          links: [
            { label: "Paper", href: "https://arxiv.org/abs/2512.18575" },
            {
              label: "Code",
              href: "https://ctseng777.github.io/MemoryAugmentedNeuromorphicSystems/",
            },
          ],
        },
      ];

      const skillGroups = {
        "Embedded & Systems": [
          "Kernel Module Development",
          "RTOS Concepts",
          "Linux Internals",
          "ARM Emulation (QEMU)",
          "Real-Time Data Monitoring",
        ],
        "Cloud & DevOps": ["AWS EC2", "SSH", "SCP", "Git", "GitHub Workflows"],
        Programming: ["C", "C++", "Python", "Bash", "JavaScript"],
        "Neuromorphic & AI": [
          "Spiking Neural Networks",
          "Neuromorphic Vision",
          "Model Ablation Studies",
          "Energy-Efficient AI",
          "Supervised Contrastive Learning",
        ],
        "Research & Tools": ["LaTeX", "Academic Writing", "Experimental Design", "Linux", "VS Code"],
      };

      function App() {
        const [activeSection, setActiveSection] = useState("home");
        const [activeSkillFilter, setActiveSkillFilter] = useState("All");

        const categories = useMemo(() => Object.keys(skillGroups), []);

        const visibleSkillGroups =
          activeSkillFilter === "All"
            ? skillGroups
            : { [activeSkillFilter]: skillGroups[activeSkillFilter] };

        useEffect(() => {
          const sections = navItems
            .map((item) => document.getElementById(item.id))
            .filter(Boolean);

          const observer = new IntersectionObserver(
            (entries) => {
              entries.forEach((entry) => {
                if (entry.isIntersecting) {
                  setActiveSection(entry.target.id);
                }
              });
            },
            { rootMargin: "-45% 0px -45% 0px", threshold: 0.01 }
          );

          sections.forEach((section) => observer.observe(section));
          return () => observer.disconnect();
        }, []);

        return (
          <div className="relative overflow-x-clip">
            <div className="pointer-events-none absolute -top-24 left-1/2 h-[420px] w-[420px] -translate-x-1/2 rounded-full bg-cyan-400/15 blur-3xl" />
            <div className="pointer-events-none absolute right-[-120px] top-[460px] h-[320px] w-[320px] rounded-full bg-sky-500/10 blur-3xl" />

            <header className="sticky top-0 z-30 border-b border-slate-800/80 bg-deep/75 backdrop-blur-xl">
              <div className="mx-auto flex w-full max-w-6xl items-center justify-between px-4 py-3 sm:px-6">
                <a href="#home" className="text-sm font-semibold tracking-wide text-slate-100 sm:text-base">
                  Junaid Rehman
                </a>
                <nav className="flex max-w-[70vw] items-center gap-1 overflow-x-auto md:max-w-none">
                  {navItems.map((item) => (
                    <a
                      key={item.id}
                      href={`#${item.id}`}
                      className={`rounded-full px-3 py-1.5 text-sm transition duration-300 ${
                        activeSection === item.id
                          ? "bg-accent/20 text-accentSoft"
                          : "text-slate-300 hover:bg-slate-800/70 hover:text-slate-100"
                      }`}
                    >
                      {item.label}
                    </a>
                  ))}
                </nav>
              </div>
            </header>

            <main className="mx-auto flex w-full max-w-6xl flex-col gap-6 px-4 py-8 sm:px-6 sm:py-10">
              <section
                id="home"
                className="grid gap-6 rounded-3xl border border-slate-800 bg-gradient-to-br from-slate-900/95 via-slate-900/90 to-sky-950/40 p-6 shadow-glow sm:p-8 lg:grid-cols-[1.3fr_0.9fr]"
              >
                <div className="space-y-5">
                  <span className="inline-flex animate-float items-center rounded-full border border-cyan-300/30 bg-cyan-300/10 px-3 py-1 text-xs font-medium tracking-wide text-cyan-200">
                    Neuromorphic Computing · Interactive CV
                  </span>
                  <div className="space-y-3">
                    <h1 className="text-3xl font-bold leading-tight text-white sm:text-4xl">{profile.name}</h1>
                    <p className="text-base font-medium text-cyan-200 sm:text-lg">{profile.role}</p>
                    <p className="max-w-2xl text-sm text-slate-300 sm:text-base">
                      Electronics engineering background with a strong focus on neuromorphic systems, efficient
                      intelligence, and hardware-aware AI research.
                    </p>
                  </div>
                  <div className="flex flex-wrap gap-3 text-sm text-slate-200">
                    <span className="rounded-full border border-slate-700 bg-slate-800/80 px-3 py-1.5">
                      📍 {profile.location}
                    </span>
                    <a
                      href={`mailto:${profile.email}`}
                      className="rounded-full border border-slate-700 bg-slate-800/80 px-3 py-1.5 transition hover:border-cyan-300/40 hover:text-cyan-200"
                    >
                      ✉ {profile.email}
                    </a>
                  </div>
                  <div className="flex flex-wrap gap-3 pt-1">
                    <a
                      href={profile.linkedin}
                      target="_blank"
                      rel="noreferrer"
                      className="rounded-full border border-slate-600 px-4 py-2 text-sm font-medium text-slate-200 transition hover:-translate-y-0.5 hover:border-accent hover:text-accentSoft"
                    >
                      LinkedIn
                    </a>
                    <a
                      href={profile.github}
                      target="_blank"
                      rel="noreferrer"
                      className="rounded-full border border-slate-600 px-4 py-2 text-sm font-medium text-slate-200 transition hover:-translate-y-0.5 hover:border-accent hover:text-accentSoft"
                    >
                      GitHub
                    </a>
                  </div>
                </div>

                <div className="grid gap-4 sm:grid-cols-2 lg:grid-cols-1">
                  {[{ label: "Education", value: "PIEAS" }, { label: "Projects", value: "01 Featured" }, { label: "Research Papers", value: "02" }, { label: "Languages", value: "English · Urdu" }].map(
                    (item) => (
                      <div
                        key={item.label}
                        className="rounded-2xl border border-slate-700/80 bg-slate-900/60 p-4 transition duration-300 hover:border-cyan-400/40"
                      >
                        <p className="text-xs uppercase tracking-wide text-slate-400">{item.label}</p>
                        <p className="mt-1 text-lg font-semibold text-slate-100">{item.value}</p>
                      </div>
                    )
                  )}
                </div>
              </section>

              <section id="featured-paper" className="rounded-3xl border border-cyan-400/30 bg-slate-900/90 p-6 shadow-glow sm:p-8">
                <div className="mb-4 flex flex-wrap items-center gap-2">
                  <span className="rounded-full bg-cyan-400/20 px-3 py-1 text-xs font-semibold uppercase tracking-wide text-cyan-200">
                    Featured Research
                  </span>
                  <span className="rounded-full bg-rose-400/20 px-3 py-1 text-xs font-semibold uppercase tracking-wide text-rose-200">
                    NICE 2026 · Under Review
                  </span>
                </div>
                <h2 className="text-2xl font-bold leading-tight text-white sm:text-3xl">{papers[0].title}</h2>
                <p className="mt-3 text-sm text-slate-300 sm:text-base">{papers[0].authors}</p>
                <p className="mt-4 text-sm leading-relaxed text-slate-300 sm:text-base">{papers[0].abstract}</p>
                <div className="mt-5 flex flex-wrap gap-3">
                  {papers[0].links.map((link) => (
                    <a
                      key={link.href}
                      href={link.href}
                      target="_blank"
                      rel="noreferrer"
                      className="rounded-full border border-cyan-300/40 bg-cyan-300/10 px-4 py-2 text-sm font-medium text-cyan-100 transition hover:-translate-y-0.5 hover:bg-cyan-300/20"
                    >
                      {link.label}
                    </a>
                  ))}
                </div>
              </section>

              <section className="grid gap-6 lg:grid-cols-2">
                <article id="education" className="rounded-3xl border border-slate-800 bg-slate-900/85 p-6 transition hover:border-slate-700 sm:p-7">
                  <h3 className="text-xl font-semibold text-white">Education</h3>
                  <div className="mt-4 rounded-2xl border border-slate-700/70 bg-slate-900/60 p-4">
                    <p className="text-base font-semibold text-slate-100">Bachelors in Electronics Engineering</p>
                    <p className="mt-1 text-sm text-cyan-200">Pakistan Institute of Engineering and Applied Sciences (PIEAS)</p>
                  </div>
                </article>

                <article id="projects" className="rounded-3xl border border-slate-800 bg-slate-900/85 p-6 transition hover:border-slate-700 sm:p-7">
                  <div className="flex flex-wrap items-center justify-between gap-2">
                    <h3 className="text-xl font-semibold text-white">Projects</h3>
                    <span className="rounded-full bg-slate-800 px-3 py-1 text-xs font-medium text-slate-300">{project.date}</span>
                  </div>
                  <p className="mt-4 text-base font-semibold text-cyan-100">{project.title}</p>
                  <ul className="mt-4 space-y-2 text-sm leading-relaxed text-slate-300">
                    {project.points.map((point) => (
                      <li key={point} className="flex gap-2">
                        <span className="mt-1 text-cyan-300">•</span>
                        <span>{point}</span>
                      </li>
                    ))}
                  </ul>
                </article>
              </section>

              <section id="research" className="rounded-3xl border border-slate-800 bg-slate-900/85 p-6 sm:p-8">
                <h3 className="text-2xl font-semibold text-white">Research Papers</h3>
                <div className="mt-5 grid gap-4 lg:grid-cols-2">
                  {papers.map((paper) => (
                    <article
                      key={paper.title}
                      className={`rounded-2xl border p-5 transition duration-300 hover:-translate-y-1 ${
                        paper.featured
                          ? "border-cyan-400/30 bg-cyan-500/5"
                          : "border-slate-700/70 bg-slate-900/70"
                      }`}
                    >
                      <div className="mb-3 flex flex-wrap items-center gap-2 text-xs">
                        <span className="rounded-full bg-slate-800 px-2.5 py-1 text-slate-200">{paper.venue}</span>
                        <span className="rounded-full bg-slate-800 px-2.5 py-1 text-slate-200">{paper.year}</span>
                        <span className="rounded-full bg-sky-400/20 px-2.5 py-1 text-sky-200">{paper.status}</span>
                      </div>
                      <h4 className="text-base font-semibold leading-snug text-white">{paper.title}</h4>
                      <p className="mt-2 text-sm text-slate-300">{paper.authors}</p>
                      <p className="mt-3 text-sm leading-relaxed text-slate-300">{paper.abstract}</p>
                      {paper.keyPoints && (
                        <ul className="mt-4 space-y-1.5 text-xs text-slate-300">
                          {paper.keyPoints.map((point) => (
                            <li key={point} className="flex gap-2">
                              <span className="text-cyan-300">•</span>
                              <span>{point}</span>
                            </li>
                          ))}
                        </ul>
                      )}
                      <div className="mt-4 flex flex-wrap gap-2">
                        {paper.links.map((link) => (
                          <a
                            key={link.href}
                            href={link.href}
                            target="_blank"
                            rel="noreferrer"
                            className="rounded-full border border-slate-600 px-3 py-1.5 text-xs font-medium text-slate-200 transition hover:border-cyan-400 hover:text-cyan-200"
                          >
                            {link.label}
                          </a>
                        ))}
                      </div>
                    </article>
                  ))}
                </div>
              </section>

              <section id="skills" className="rounded-3xl border border-slate-800 bg-slate-900/85 p-6 sm:p-8">
                <div className="flex flex-wrap items-center justify-between gap-3">
                  <h3 className="text-2xl font-semibold text-white">Skills Dashboard</h3>
                  <span className="rounded-full bg-slate-800 px-3 py-1 text-xs text-slate-300">Interactive Filters</span>
                </div>

                <div className="mt-4 flex flex-wrap gap-2">
                  {["All", ...categories].map((category) => (
                    <button
                      key={category}
                      type="button"
                      onClick={() => setActiveSkillFilter(category)}
                      className={`rounded-full px-3.5 py-1.5 text-xs font-medium transition sm:text-sm ${
                        activeSkillFilter === category
                          ? "bg-cyan-300 text-slate-900"
                          : "border border-slate-700 bg-slate-900 text-slate-300 hover:border-cyan-400/50 hover:text-cyan-100"
                      }`}
                      aria-pressed={activeSkillFilter === category}
                    >
                      {category}
                    </button>
                  ))}
                </div>

                <div className="mt-5 grid gap-4 sm:grid-cols-2 xl:grid-cols-3">
                  {Object.entries(visibleSkillGroups).map(([category, skills]) => (
                    <article
                      key={category}
                      className="rounded-2xl border border-slate-700/70 bg-slate-900/70 p-4 transition duration-300 hover:border-cyan-400/40"
                    >
                      <h4 className="text-sm font-semibold uppercase tracking-wide text-cyan-200">{category}</h4>
                      <div className="mt-3 flex flex-wrap gap-2">
                        {skills.map((skill) => (
                          <span
                            key={skill}
                            className="rounded-full border border-slate-600 bg-slate-800/80 px-3 py-1 text-xs text-slate-200"
                          >
                            {skill}
                          </span>
                        ))}
                      </div>
                    </article>
                  ))}
                </div>
              </section>

              <section id="achievements" className="grid gap-6 lg:grid-cols-2">
                <article className="rounded-3xl border border-slate-800 bg-slate-900/85 p-6 sm:p-7">
                  <h3 className="text-xl font-semibold text-white">Language Skills</h3>
                  <div className="mt-4 space-y-3">
                    {["English - Fluent", "Urdu - Fluent"].map((language) => (
                      <div key={language} className="rounded-xl border border-slate-700 bg-slate-900/60 p-3 text-sm text-slate-200">
                        {language}
                      </div>
                    ))}
                  </div>
                </article>

                <article className="rounded-3xl border border-slate-800 bg-slate-900/85 p-6 sm:p-7">
                  <h3 className="text-xl font-semibold text-white">Achievements</h3>
                  <div className="mt-4 rounded-2xl border border-amber-300/30 bg-amber-300/10 p-4">
                    <p className="text-sm font-medium text-amber-100">🏉 National-level Rugby Player</p>
                  </div>
                </article>
              </section>

              <footer id="contact" className="rounded-3xl border border-slate-800 bg-slate-900/85 p-6 text-sm text-slate-300 sm:p-7">
                <div className="flex flex-col gap-2 sm:flex-row sm:items-center sm:justify-between">
                  <p>
                    © {new Date().getFullYear()} {profile.name}
                  </p>
                  <div className="flex flex-wrap gap-4">
                    <a href={`mailto:${profile.email}`} className="transition hover:text-cyan-200">
                      {profile.email}
                    </a>
                    <a href={profile.linkedin} target="_blank" rel="noreferrer" className="transition hover:text-cyan-200">
                      LinkedIn
                    </a>
                    <a href={profile.github} target="_blank" rel="noreferrer" className="transition hover:text-cyan-200">
                      GitHub
                    </a>
                  </div>
                </div>
              </footer>
            </main>
          </div>
        );
      }

      ReactDOM.createRoot(document.getElementById("root")).render(<App />);
    </script>
  </body>
</html>
